{% extends 'base.html' %}

{% block title %}Login – MovieHub Explorer{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow border-0">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="bi bi-camera-reels-fill text-danger fs-1"></i>
            <h3 class="fw-bold mt-2">Welcome Back</h3>
            <p class="text-muted">Sign in to your MovieHub Explorer account</p>
          </div>

          <form method="POST">
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control"
                       placeholder="Enter your username" required autofocus>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control"
                       placeholder="Enter your password" required>
              </div>
            </div>

            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="remember" name="remember">
              <label class="form-check-label" for="remember">Remember me</label>
            </div>

            <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Login
            </button>
          </form>

          <hr class="my-4">
          <p class="text-center text-muted mb-0">
            Don't have an account?
            <a href="{{ url_for('auth.register') }}" class="text-danger fw-semibold text-decoration-none">
              Sign up free
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
