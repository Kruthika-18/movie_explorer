{% extends 'base.html' %}

{% block title %}Create Account – MovieHub Explorer{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="bi bi-camera-reels-fill text-danger fs-1"></i>
            <h3 class="fw-bold mt-2">Create Free Account</h3>
            <p class="text-muted">Join MovieHub Explorer to track your movies</p>
          </div>

          <form method="POST">
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control"
                       placeholder="Choose a username (min 3 chars)"
                       value="{{ username or '' }}" required autofocus minlength="3">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control"
                       placeholder="your@email.com"
                       value="{{ email or '' }}" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control"
                       placeholder="At least 6 characters" required minlength="6">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Confirm Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" name="confirm_password" class="form-control"
                       placeholder="Repeat your password" required>
              </div>
            </div>

            <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold">
              <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
          </form>

          <hr class="my-4">
          <p class="text-center text-muted mb-0">
            Already have an account?
            <a href="{{ url_for('auth.login') }}" class="text-danger fw-semibold text-decoration-none">
              Log in
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
